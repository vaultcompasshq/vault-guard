name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22.14.0
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build packages
      run: pnpm build

    - name: Regenerate docs/RULES.md and check for drift
      run: node scripts/gen-rules-doc.cjs && git diff --exit-code docs/RULES.md

    - name: Run tests with coverage
      run: pnpm test:coverage

    - name: Verify publish hygiene (no source maps or test artifacts in tarballs)
      run: pnpm check:pack

    # npm Trusted Publishing (OIDC): no NPM_TOKEN; auth via id-token: write +
    # trusted publisher on each @vaultcompass/* package (workflow: release.yml).
    # Requires npm CLI >= 11.5.1 (Node >= 22.14.0). Pin major 11 — npm@12 needs newer Node.
    - name: Upgrade npm for OIDC trusted publishing
      run: npm install -g npm@11

    - name: Publish to npm
      run: pnpm publish -r --access public --no-git-checks

    - name: Create GitHub Release
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
      with:
        generate_release_notes: true
        body: |
          Published `@vaultcompass/vault-guard`, `@vaultcompass/vault-guard-core`, `@vaultcompass/vault-guard-mcp`, and `@vaultcompass/vault-guard-telemetry` to npm (private workspace packages are skipped). See [CHANGELOG.md](https://github.com/vaultcompasshq/vault-guard/blob/main/CHANGELOG.md).

  smoke-published:
    name: Smoke test published CLI
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (fixture only)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install published package and assert scan fails on fixture
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "Smoke testing @vaultcompass/vault-guard@${VERSION}"

          FOUND=0
          for i in $(seq 1 12); do
            if [[ "$(npm view "@vaultcompass/vault-guard@${VERSION}" version 2>/dev/null)" == "${VERSION}" ]]; then
              echo "Package visible on registry."
              FOUND=1
              break
            fi
            echo "Waiting for npm registry (attempt ${i}/12)…"
            sleep 10
          done
          if [[ "${FOUND}" -ne 1 ]]; then
            echo "::error::Timed out waiting for @vaultcompass/vault-guard@${VERSION} on the npm registry."
            exit 1
          fi

          WORK="${GITHUB_WORKSPACE}"
          FIXTURE="${WORK}/fixtures/release-smoke"
          TMP=$(mktemp -d)
          cd "${TMP}"
          npm init -y >/dev/null 2>&1
          npm install "@vaultcompass/vault-guard@${VERSION}"

          set +e
          ./node_modules/.bin/vault-guard scan "${FIXTURE}" --format json > smoke-out.json 2>smoke-err.log
          EC=$?
          set -e

          if [[ "${EC}" -eq 0 ]]; then
            echo "::error::Expected vault-guard scan to exit non-zero (fixture contains a synthetic secret pattern)."
            cat smoke-err.log || true
            exit 1
          fi

          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('smoke-out.json', 'utf8'));
            const n = j.summary && j.summary.secrets;
            if (!(typeof n === 'number' && n > 0)) {
              console.error('Bad JSON summary', j);
              process.exit(1);
            }
          "
          echo "Release smoke passed."
