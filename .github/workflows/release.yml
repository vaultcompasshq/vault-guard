name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup pnpm
      uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      with:
        version: 9

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 20.x
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build packages
      run: pnpm build

    - name: Regenerate docs/RULES.md and check for drift
      run: node scripts/gen-rules-doc.cjs && git diff --exit-code docs/RULES.md

    - name: Run tests with coverage
      run: pnpm test:coverage

    - name: Publish to npm
      run: pnpm publish -r --access public --no-git-checks
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        NPM_CONFIG_PROVENANCE: 'true'

    - name: Create GitHub Release
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.2.2
      with:
        generate_release_notes: true
        body: |
          Published `@vaultcompass/vault-guard`, `@vaultcompass/vault-guard-core`, `@vaultcompass/vault-guard-mcp`, and `@vaultcompass/vault-guard-telemetry` to npm (private workspace packages are skipped). See [CHANGELOG.md](https://github.com/vaultcompasshq/vault-guard/blob/main/CHANGELOG.md).

  smoke-published:
    name: Smoke test published CLI
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (fixture only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install published package and assert scan fails on fixture
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "Smoke testing @vaultcompass/vault-guard@${VERSION}"

          FOUND=0
          for i in $(seq 1 12); do
            if [[ "$(npm view "@vaultcompass/vault-guard@${VERSION}" version 2>/dev/null)" == "${VERSION}" ]]; then
              echo "Package visible on registry."
              FOUND=1
              break
            fi
            echo "Waiting for npm registry (attempt ${i}/12)…"
            sleep 10
          done
          if [[ "${FOUND}" -ne 1 ]]; then
            echo "::error::Timed out waiting for @vaultcompass/vault-guard@${VERSION} on the npm registry."
            exit 1
          fi

          WORK="${GITHUB_WORKSPACE}"
          FIXTURE="${WORK}/fixtures/release-smoke"
          TMP=$(mktemp -d)
          cd "${TMP}"
          npm init -y >/dev/null 2>&1
          npm install "@vaultcompass/vault-guard@${VERSION}"

          set +e
          ./node_modules/.bin/vault-guard scan "${FIXTURE}" --format json > smoke-out.json 2>smoke-err.log
          EC=$?
          set -e

          if [[ "${EC}" -eq 0 ]]; then
            echo "::error::Expected vault-guard scan to exit non-zero (fixture contains a synthetic secret pattern)."
            cat smoke-err.log || true
            exit 1
          fi

          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('smoke-out.json', 'utf8'));
            const n = j.summary && j.summary.secrets;
            if (!(typeof n === 'number' && n > 0)) {
              console.error('Bad JSON summary', j);
              process.exit(1);
            }
          "
          echo "Release smoke passed."
