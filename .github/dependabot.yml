version: 2
updates:
  # Root + workspace npm dependencies. pnpm uses the npm ecosystem here.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      types:
        patterns:
          - "@types/*"
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
      jest:
        patterns:
          - "jest"
          - "ts-jest"
          - "@types/jest"
    ignore:
      # Keep CommonJS Node tooling on stable majors.
      - dependency-name: "commander"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions in .github/workflows/.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
